<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva SNS Auto-Chef</title>
　　 <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧑‍🍳</text></svg>">
　　 <script src="https://cdn.tailwindcss.com"></script>    <style>
        .loader { border-top-color: #4f46e5; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 min-h-screen py-8">

<div class="max-w-6xl mx-auto p-6">
    <header class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-indigo-600 mb-2">🧑‍🍳 Canva SNS Auto-Chef</h1>
        <p class="text-gray-500">Gemini AIが構成・SOP・プロンプトを全自動で調理します</p>
    </header>

    <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-yellow-400 mb-6 flex flex-col md:flex-row gap-4 items-center justify-between">
        <div class="flex-1 w-full">
            <label class="block mb-1 font-bold text-gray-700 text-sm">🔑 無料のGemini APIキー</label>
            <div class="flex gap-2 items-center">
                <input type="password" id="apiKey" class="flex-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-yellow-400 focus:outline-none" placeholder="AIzaSy... (Google AI Studioで取得してここに入力)">
                <button id="toggleKeyBtn" onclick="toggleKeyVisibility()"
                    class="px-3 py-2 text-xs font-bold bg-gray-100 hover:bg-gray-200 text-gray-600 border border-gray-300 rounded transition whitespace-nowrap">
                    表示
                </button>
                <button onclick="saveApiKey()"
                    class="px-4 py-2 text-xs font-bold bg-yellow-400 hover:bg-yellow-500 text-white rounded transition whitespace-nowrap shadow">
                    💾 保存
                </button>
            </div>
            <div id="keySaveMsg" class="hidden mt-1 text-xs text-green-600 font-bold">✓ APIキーをブラウザに保存しました</div>
        </div>
        <div class="text-xs text-gray-500 max-w-xs">
            ※「保存」を押すとブラウザのlocalStorageに保存され、次回から自動入力されます。<br>GitHubには公開されません。
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 lg:col-span-1 h-fit">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                <span class="text-2xl">📝</span> 材料を入れる
            </h2>

            <label class="block mb-2 text-sm font-bold text-gray-700">プラットフォーム</label>
            <select id="platform" class="w-full p-3 mb-5 border rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                <option value="Instagram カルーセル (1080×1080)">📸 Instagram カルーセル (1080×1080)</option>
                <option value="Instagram フィード単体 (1080×1350)">🖼️ Instagram フィード単体 (1080×1350推奨)</option>
                <option value="Instagram リール (1080×1920)">🎬 Instagram リール (1080×1920)</option>
                <option value="縦型ショート動画 (9:16) TikTok/YouTube Shorts">🎵 縦型ショート動画 (9:16)</option>
                <option value="X(Twitter) 画像投稿 (1200×675)">✖️ X / Twitter 画像 (1200×675)</option>
                <option value="X スレッド（連投）">🧵 X スレッド（連投）</option>
                <option value="Threads 投稿用画像">🔗 Threads 投稿用画像</option>
                <option value="YouTube サムネイル (1280×720)">▶️ YouTube サムネイル (1280×720)</option>
                <option value="Pinterest ピン (1000×1500)">📌 Pinterest ピン (1000×1500)</option>
                <option value="LINE VOOM 画像">💬 LINE VOOM 画像</option>
            </select>

            <label class="block mb-2 text-sm font-bold text-gray-700">投稿のアイデア・原稿</label>
            <textarea id="inputText" rows="8"
                class="w-full p-3 mb-5 border rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm resize-y"
                placeholder="例：心理学に基づいた、モチベーションを維持する3つの方法について解説したい。"></textarea>

            <button id="generateBtn"
                class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition shadow-md text-sm">
                マニュアルを生成する ✨
            </button>

            <div id="loading" class="hidden mt-4 text-center py-4">
                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-8 w-8 mx-auto mb-3"></div>
                <p class="text-sm text-indigo-600 font-bold">Geminiが調理中... (約5〜10秒)</p>
            </div>

            <div id="errorBox" class="hidden mt-3 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-xs leading-relaxed"></div>
        </div>

        <div id="placeholderArea"
            class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 lg:col-span-2 flex flex-col justify-center items-center text-gray-400 min-h-[400px]">
            <div class="text-6xl mb-4">🍽️</div>
            <p class="text-lg font-bold mb-2">準備完了です！</p>
            <p class="text-sm text-center">
                上の欄にAPIキーを設定し、左側のフォームに入力して「生成する」を押すと、<br>
                ここに構成・SOP・プロンプトが出力されます。
            </p>
        </div>

        <div id="outputArea" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 lg:col-span-2 hidden">
            <h2 class="text-xl font-bold mb-4 text-gray-800 flex items-center gap-2">
                <span class="text-2xl">✨</span> 調理結果
            </h2>

            <div class="flex border-b mb-5 overflow-x-auto">
                <button id="btn-outline" class="tab-btn px-4 py-3 font-bold text-indigo-600 border-b-2 border-indigo-600 whitespace-nowrap"
                    onclick="switchTab('outline', this)">② 投稿構成</button>
                <button id="btn-sop" class="tab-btn px-4 py-3 font-bold text-gray-500 hover:text-indigo-600 whitespace-nowrap transition border-b-2 border-transparent"
                    onclick="switchTab('sop', this)">① 操作SOP</button>
                <button id="btn-prompts" class="tab-btn px-4 py-3 font-bold text-gray-500 hover:text-indigo-600 whitespace-nowrap transition border-b-2 border-transparent"
                    onclick="switchTab('prompts', this)">③ AIプロンプト</button>
            </div>

            <div id="outline"  class="tab-pane block  whitespace-pre-wrap text-sm text-gray-700 bg-gray-50 p-6 rounded-lg border leading-relaxed min-h-[180px] max-h-[400px] overflow-y-auto"></div>
            <div id="sop"      class="tab-pane hidden whitespace-pre-wrap text-sm text-gray-700 bg-gray-50 p-6 rounded-lg border leading-relaxed min-h-[180px] max-h-[400px] overflow-y-auto"></div>
            <div id="prompts"  class="tab-pane hidden whitespace-pre-wrap text-sm text-gray-700 bg-gray-50 p-6 rounded-lg border leading-relaxed min-h-[180px] max-h-[400px] overflow-y-auto"></div>

            <div class="mt-5 flex justify-end items-center gap-3">
                <span id="copyMsg" class="text-green-600 text-xs font-bold hidden">✓ コピーしました！</span>
                <button onclick="copyAll()"
                    class="text-sm font-bold bg-white hover:bg-gray-100 text-gray-600 py-2 px-4 rounded shadow border transition">
                    📄 全てコピー
                </button>
                <button onclick="copyCurrentTab()"
                    class="text-sm font-bold bg-white hover:bg-gray-100 text-gray-700 py-2 px-4 rounded shadow border transition">
                    📋 表示中をコピー
                </button>
            </div>
        </div>

    </div>
</div>

<script>
    const STORAGE_KEY = 'canva_auto_chef_gemini_key';

    // ページ読み込み時にAPIキーを自動復元
    window.addEventListener('DOMContentLoaded', () => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            document.getElementById('apiKey').value = saved;
        }
    });

    function saveApiKey() {
        const key = document.getElementById('apiKey').value.trim();
        if (!key) { alert('APIキーを入力してから保存してください。'); return; }
        localStorage.setItem(STORAGE_KEY, key);
        const msg = document.getElementById('keySaveMsg');
        msg.classList.remove('hidden');
        setTimeout(() => msg.classList.add('hidden'), 3000);
    }

    function toggleKeyVisibility() {
        const input = document.getElementById('apiKey');
        const btn = document.getElementById('toggleKeyBtn');
        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = '隠す';
        } else {
            input.type = 'password';
            btn.textContent = '表示';
        }
    }

    const SYSTEM_PROMPT = `あなたは「SNSデザイン戦略家 兼 Canva Pro制作ディレクター」です。
    ユーザーから入力されたSNS投稿の要件を分析し、以下の3つをJSON形式のみで出力してください。
    
    1. outline: スライド・画像の構成、見出し、内容設計、デザインアイデア
    2. sop: Canva Proの最短編集ステップ（使用機能・具体的手順・書き出し仕様）
    3. prompts: Magic Design用日本語プロンプト、Magic Media用英語プロンプト、イメージ解説
    
    【重要】JSONの値（value）は、ネストされたオブジェクトや配列にせず、必ず「改行（\\n）を含んだ1つの長い文字列（String）」として出力してください。
    【出力制限】JSONテキストのみ。コードブロック(\`\`\`json)・マークダウン・前置き文は一切不要。
    {"outline":"...","sop":"...","prompts":"..."}
    ライトモードのデザインを想定してください。`;
    
    let lastResult = {};
    let activeTabId = 'outline';
    
    function switchTab(id, btn) {
        document.querySelectorAll('.tab-pane').forEach(el => el.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('text-indigo-600', 'border-indigo-600');
                el.classList.add('text-gray-500', 'border-transparent');
        });
        document.getElementById(id).classList.remove('hidden');
        btn.classList.remove('text-gray-500', 'border-transparent');
        btn.classList.add('text-indigo-600', 'border-indigo-600');
        activeTabId = id;
    }
    
    function copyCurrentTab() {
        const txt = document.getElementById(activeTabId)?.innerText || '';
        navigator.clipboard.writeText(txt).then(showCopy);
    }
    
    function copyAll() {
        const all = ['outline','sop','prompts']
        .map(k => `=== ${k} ===\n` + (lastResult[k] || ''))
        .join('\n\n');
        navigator.clipboard.writeText(all).then(showCopy);
    }
    
    function showCopy() {
        const el = document.getElementById('copyMsg');
        el.classList.remove('hidden');
        setTimeout(() => el.classList.add('hidden'), 2000);
    }
    
    // 万が一オブジェクトで返ってきても強制的にテキスト化する安全装置
    function formatOutput(val) {
        if (!val) return '（生成されませんでした）';
        if (typeof val === 'string') return val;
        return JSON.stringify(val, null, 2); 
    }
    
    document.getElementById('generateBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey')?.value.trim();
            const platform = document.getElementById('platform').value;
            const text     = document.getElementById('inputText').value.trim();
            
            if (!apiKey) { alert('画面上部の「🔑 Gemini APIキー」を入力してください！'); return; }
            if (!text) { alert('投稿のアイデアを入力してください！'); return; }
            
            document.getElementById('generateBtn').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('placeholderArea').classList.add('hidden');
            document.getElementById('outputArea').classList.add('hidden');
            document.getElementById('errorBox').classList.add('hidden');
            
            try {
                const fullPrompt = `${SYSTEM_PROMPT}\n\nプラットフォーム：${platform}\n投稿アイデア：${text}`;
                
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                            contents: [{ parts: [{ text: fullPrompt }] }],
                            generationConfig: { responseMimeType: "application/json" }
                    })
            });
            
            if (!res.ok) {
                const e = await res.json();
                throw new Error(e.error?.message || `HTTP ${res.status}`);
            }
            
            const data = await res.json();
            const responseText = data.candidates[0].content.parts[0].text;
            
            const clean = responseText.replace(/```json\n?|```/g, '').trim();
            const result = JSON.parse(clean);
            
            // 安全装置を通してデータを格納
            lastResult = {
                outline: formatOutput(result.outline),
                sop: formatOutput(result.sop),
                prompts: formatOutput(result.prompts)
            };
            
            document.getElementById('outline').innerText  = lastResult.outline;
            document.getElementById('sop').innerText      = lastResult.sop;
            document.getElementById('prompts').innerText  = lastResult.prompts;
            
            switchTab('outline', document.getElementById('btn-outline'));
            document.getElementById('outputArea').classList.remove('hidden');
            
        } catch (err) {
            const box = document.getElementById('errorBox');
            box.innerText = '⚠️ エラー: APIキーが無効か、通信エラーです。\n詳細: ' + err.message;
            box.classList.remove('hidden');
            document.getElementById('placeholderArea').classList.remove('hidden');
        } finally {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('generateBtn').classList.remove('hidden');
        }
});
</script>
</body>
</html>
